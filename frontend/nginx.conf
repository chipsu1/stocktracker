server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Obsługa SPA — wszystko trafia do index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy do backendu (opcjonalnie jeśli nie używasz osobnego domeny)
    location /api/ {
        proxy_pass ${VITE_API_URL}/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
